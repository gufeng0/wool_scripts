name: Sync Upstream Daily

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/fmz200/wool_scripts.git || true

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Merge upstream/main into main
        run: |
          git merge upstream/main --no-edit

      - name: Push to origin
        run: |
          git push origin main
